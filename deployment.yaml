apiVersion: apps/v1
kind: Deployment
metadata:
  name: kubernetes-pipeline
spec:
  replicas: 2
  selector:
    matchLabels:
      app: kubernetes-pipeline
  template:
    metadata:
      labels:
        app: kubernetes-pipeline
    spec:
      containers:
      - name: kubernetes-pipeline
        image: kamaleshwars/kubernetes-pipeline:latest
        ports:
        - containerPort: 80

---
apiVersion: v1
kind: Service
metadata:
  name: kubernetes-pipeline-service
spec:
  type: NodePort
  selector:
    app: kubernetes-pipeline
  ports:
  - port: 80
    targetPort: 80
    nodePort: 30010
